name: Production Smoke Check

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Deployed Cendorq URL to smoke-check"
        required: true
        default: "https://cendorq.com"
        type: string

permissions:
  contents: read

concurrency:
  group: smoke-production-${{ github.workflow }}-${{ github.event_name }}-${{ github.event.inputs.base_url || 'https://cendorq.com' }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke-check deployed site
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      NEXT_TELEMETRY_DISABLED: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      CENDORQ_BASE_URL: ${{ github.event.inputs.base_url || 'https://cendorq.com' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run production smoke check
        run: pnpm smoke:production
