name: Production Smoke Check

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Deployed Cendorq URL to smoke-check"
        required: true
        default: "https://cendorq.com"
        type: string

permissions:
  contents: read

concurrency:
  group: smoke-production-${{ github.workflow }}-${{ github.event_name }}-${{ github.event.inputs.base_url || 'https://cendorq.com' }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke-check deployed site
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      NEXT_TELEMETRY_DISABLED: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      CENDORQ_BASE_URL: ${{ github.event.inputs.base_url || 'https://cendorq.com' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate production smoke target
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          const rawValue = process.env.CENDORQ_BASE_URL;
          const value = rawValue?.trim();

          if (!value) {
            console.error("CENDORQ_BASE_URL is required for production smoke checks.");
            process.exit(1);
          }

          let parsed;
          try {
            parsed = new URL(value);
          } catch (error) {
            console.error(`CENDORQ_BASE_URL must be a valid URL. Received: ${value}`);
            process.exit(1);
          }

          if (!["http:", "https:"].includes(parsed.protocol)) {
            console.error(`CENDORQ_BASE_URL must use http or https. Received: ${parsed.protocol}`);
            process.exit(1);
          }

          console.log(`::notice title=Production smoke target::${parsed.origin}`);
          NODE

      - name: Run production smoke check
        run: pnpm smoke:production
