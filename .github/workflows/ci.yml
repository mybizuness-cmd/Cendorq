name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Route guard, typecheck, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate canonical routes
        run: node ./src/scripts/validate-routes.mjs

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run production build
        run: pnpm build
