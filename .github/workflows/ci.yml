name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - tailwind-4-dedicated-migration
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Route guard, lint, typecheck, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_OPTIONS: "--max-old-space-size=4096"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - name: Generate Tailwind 4 lockfile for migration review
        run: |
          pnpm install --lockfile-only --ignore-scripts
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF_NAME}" = "tailwind-4-dedicated-migration" ]; then
            if ! git diff --quiet -- pnpm-lock.yaml; then
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add pnpm-lock.yaml
              git commit -m "Regenerate Tailwind 4 lockfile"
              git push
            fi
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate canonical routes
        run: pnpm validate:routes

      - name: Run lint
        run: pnpm lint

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run production build
        run: pnpm build
