name: Release Control

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: release-control-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-control:
    name: Validate, typecheck, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release-control workflow
        run: node ./src/scripts/validate-release-control-workflow.mjs

      - name: Validate routes and guardrails
        run: pnpm validate:routes

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
