version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    versioning-strategy: increase-if-necessary
    labels:
      - dependencies
      - controlled-update
    commit-message:
      prefix: deps
      include: scope
    groups:
      next-react-platform:
        patterns:
          - next
          - react
          - react-dom
          - eslint-config-next
      typescript-tooling:
        patterns:
          - typescript
          - "@types/*"
          - "@typescript-eslint/*"
      styling-tooling:
        patterns:
          - tailwindcss
          - "@tailwindcss/*"
          - postcss
          - autoprefixer
      lint-tooling:
        patterns:
          - eslint
          - "eslint-*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 3
    labels:
      - github-actions
      - controlled-update
    commit-message:
      prefix: ci
      include: scope
    groups:
      github-actions:
        patterns:
          - "*"
