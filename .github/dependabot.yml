version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 6
    labels:
      - dependencies
      - maintenance
    commit-message:
      prefix: deps
      include: scope
    groups:
      next-react-platform:
        patterns:
          - next
          - react
          - react-dom
          - eslint-config-next
      typescript-tooling:
        patterns:
          - typescript
          - "@types/*"
          - "@typescript-eslint/*"
      routine-build-tooling:
        patterns:
          - postcss
          - autoprefixer
          - eslint
      tailwind-major-migration:
        patterns:
          - tailwindcss

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "10:30"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
      - maintenance
    commit-message:
      prefix: ci
      include: scope
    groups:
      github-actions:
        patterns:
          - "*"
